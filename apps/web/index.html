<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="每日打卡 — 记录每天完成的小事，养成好习惯" />
    <meta name="theme-color" content="#1f7268" />
    <meta property="og:title" content="每日打卡" />
    <meta property="og:description" content="记录每天完成的小事，养成好习惯" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='%231f7268'/><path d='M10 16.5l4 4 8-9' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>每日打卡</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳到内容</a>
    <div id="app">
      <div class="boot-screen">
        <div class="boot-mark"></div>
        <p>加载中…</p>
      </div>
    </div>
    <div id="app-error" class="app-error" style="display:none;">
      <div class="app-error-panel">
        <div class="app-error-mark">!</div>
        <h2>页面加载失败</h2>
        <p>缓存可能过期了，刷新后重试。</p>
        <button class="primary-button" onclick="clearCacheAndReload()">强制刷新</button>
      </div>
    </div>
    <script>
      function clearCacheAndReload() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(r) { r.forEach(function(s) { s.unregister(); }); });
        }
        if ('caches' in window) {
          caches.keys().then(function(k) { k.forEach(function(n) { caches.delete(n); }); });
        }
        location.reload(true);
      }
      // If Vue app doesn't mount within 3 seconds, show error
      var errTimer = setTimeout(function() {
        if (!document.querySelector('[data-v-app]')) {
          document.getElementById('app-error').style.display = 'block';
        }
      }, 3000);
      window.__appLoaded = function() { clearTimeout(errTimer); };
    </script>
    <style>
      .skip-link {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 300;
        padding: 10px 14px;
        border-radius: 999px;
        background: #fbfbf8;
        color: #141917;
        box-shadow: 0 16px 28px rgba(17, 25, 23, 0.12);
        transform: translateY(-180%);
        transition: transform 180ms ease;
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      .boot-screen {
        display: grid;
        place-items: center;
        min-height: 100vh;
        gap: 14px;
        color: #5f6d67;
        background:
          radial-gradient(circle at 20% 20%, rgba(24, 106, 96, 0.12), transparent 26%),
          radial-gradient(circle at 80% 0%, rgba(161, 111, 45, 0.12), transparent 24%),
          linear-gradient(180deg, #f8faf7 0%, #f3f5f1 100%);
        font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      .boot-mark {
        width: 44px;
        height: 44px;
        border-radius: 16px;
        background: linear-gradient(135deg, #dceee9, #bfdcd5);
        box-shadow: 0 12px 24px rgba(24, 106, 96, 0.12);
      }

      .boot-screen p {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
      }

      .app-error {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(24, 106, 96, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(161, 111, 45, 0.12), transparent 24%),
          linear-gradient(180deg, #f8faf7 0%, #f3f5f1 100%);
      }

      .app-error-panel {
        width: min(100%, 420px);
        padding: 28px;
        border-radius: 24px;
        background: rgba(251, 251, 248, 0.94);
        border: 1px solid rgba(223, 230, 225, 0.85);
        box-shadow: 0 24px 44px rgba(17, 25, 23, 0.12);
        text-align: center;
      }

      .app-error-mark {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 18px;
        background: #f8e6e6;
        color: #b83e3e;
        display: grid;
        place-items: center;
        font-size: 24px;
        font-weight: 800;
      }

      .app-error-panel h2 {
        margin: 0 0 8px;
        color: #141917;
        font-size: 20px;
      }

      .app-error-panel p {
        margin: 0 0 18px;
        color: #66736d;
        font-size: 14px;
        line-height: 1.6;
      }
    </style>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
