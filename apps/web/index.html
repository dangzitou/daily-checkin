<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#2f8f83" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>每日打卡</title>
  </head>
  <body>
    <div id="app">
      <div style="display:grid;place-items:center;min-height:100vh;font-family:system-ui;color:#62736d;">
        <p>加载中…</p>
      </div>
    </div>
    <div id="app-error" style="display:none;position:fixed;inset:0;z-index:9999;background:#fff;font-family:system-ui;padding:40px;text-align:center;">
      <p style="font-size:48px;margin:0;">⚠️</p>
      <h2 style="color:#333;">页面加载失败</h2>
      <p style="color:#666;font-size:14px;">缓存过期，请点击下方按钮刷新</p>
      <button onclick="clearCacheAndReload()" style="margin-top:20px;padding:14px 28px;font-size:16px;font-weight:700;background:#23786f;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 强制刷新</button>
    </div>
    <script>
      function clearCacheAndReload() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(r) { r.forEach(function(s) { s.unregister(); }); });
        }
        if ('caches' in window) {
          caches.keys().then(function(k) { k.forEach(function(n) { caches.delete(n); }); });
        }
        location.reload(true);
      }
      // If Vue app doesn't mount within 3 seconds, show error
      var errTimer = setTimeout(function() {
        if (!document.querySelector('[data-v-app]')) {
          document.getElementById('app-error').style.display = 'block';
        }
      }, 3000);
      window.__appLoaded = function() { clearTimeout(errTimer); };
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
